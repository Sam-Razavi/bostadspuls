version: 2

models:
  - name: mart_yoy_comparison
    description: >
      Year-over-year price change per county and period. One row per
      (county, period_start, period_type). yoy_pct_change is null when
      no data exists for the prior year period.
    columns:
      - name: county
        tests: [not_null]
      - name: region_code
        tests: [not_null]
      - name: period_start
        tests: [not_null]
      - name: period_type
        tests:
          - not_null
          - accepted_values:
              values: ["month", "quarter"]
      - name: sales_count
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 1
      - name: avg_price_per_sqm
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 1000
              max_value: 200000
      - name: yoy_pct_change
        tests:
          - dbt_utils.accepted_range:
              min_value: -100
              max_value: 500
              where: "yoy_pct_change is not null"
