version: 2

models:
  - name: dim_date
    description: >
      Calendar date dimension generated by dbt_date.get_date_dimension.
      Covers 2020-01-01 through 2030-12-31. Grain: one row per calendar date.
    columns:
      - name: date_day
        description: "Calendar date."
        tests: [not_null, unique]
      - name: year_number
        description: "Four-digit year."
        tests: [not_null]
      - name: month_of_year
        description: "Month number (1–12)."
        tests: [not_null]
      - name: day_of_week
        description: "ISO day of week (1=Monday, 7=Sunday)."
        tests: [not_null]
      - name: quarter_of_year
        description: "Quarter number (1–4)."
        tests: [not_null]
