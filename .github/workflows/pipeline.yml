name: Daily ingestion pipeline

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:
    inputs:
      partition_date:
        description: "Date to backfill (YYYY-MM-DD). Defaults to yesterday."
        required: false
        type: string

env:
  PYTHON_VERSION: "3.12"

jobs:
  ingest:
    name: Ingest SCB + Booli → BigQuery
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Run SCB ingestion
        env:
          BIGQUERY_PROJECT: ${{ secrets.BIGQUERY_PROJECT }}
          BIGQUERY_DATASET_RAW: bostadspuls_raw
        run: |
          python -c "
          import asyncio
          from bostadspuls_ingest.scb import SCBClient, parse_price_index
          from bostadspuls_ingest.bigquery import load_scb_price_index
          client = SCBClient()
          data = asyncio.run(client.fetch_price_index())
          df = parse_price_index(data)
          load_scb_price_index(df)
          print(f'Loaded {len(df)} SCB rows')
          "

      - name: Run Booli ingestion
        env:
          BOOLI_CALLER_ID: ${{ secrets.BOOLI_CALLER_ID }}
          BOOLI_KEY: ${{ secrets.BOOLI_KEY }}
          BIGQUERY_PROJECT: ${{ secrets.BIGQUERY_PROJECT }}
          BIGQUERY_DATASET_RAW: bostadspuls_raw
        run: |
          python -c "
          from bostadspuls_ingest.booli import BooliClient, parse_booli_listings
          from bostadspuls_ingest.bigquery import load_booli_listings
          client = BooliClient()
          raw = client.fetch_sold_all_pages()
          df = parse_booli_listings(raw)
          load_booli_listings(df)
          print(f'Loaded {len(df)} Booli rows')
          "

  transform:
    name: dbt run + test
    runs-on: ubuntu-latest
    needs: ingest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dbt
        run: pip install dbt-bigquery

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Write dbt profiles
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          bostadspuls:
            target: prod
            outputs:
              prod:
                type: bigquery
                method: oauth
                project: ${{ secrets.BIGQUERY_PROJECT }}
                dataset: bostadspuls_staging
                threads: 4
                location: EU
          EOF

      - name: dbt deps
        working-directory: transform
        run: dbt deps

      - name: dbt run
        working-directory: transform
        run: dbt run --target prod

      - name: dbt test
        working-directory: transform
        run: dbt test --target prod

      - name: Install Soda Core
        run: pip install soda-core-bigquery

      - name: Soda scan raw tables
        env:
          BIGQUERY_PROJECT: ${{ secrets.BIGQUERY_PROJECT }}
        run: soda scan -d bostadspuls_bq -c quality/soda_config.yml quality/checks_raw.yml

      - name: Soda scan marts
        env:
          BIGQUERY_PROJECT: ${{ secrets.BIGQUERY_PROJECT }}
        run: soda scan -d bostadspuls_bq -c quality/soda_config.yml quality/checks_marts.yml
