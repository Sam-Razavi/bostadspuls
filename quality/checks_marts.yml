checks for bostadspuls_marts.fact_sales:
  - row_count > 0:
      name: fact_sales_not_empty
  - missing_count(booli_id) = 0:
      name: fact_sales_no_null_id
  - duplicate_count(booli_id) = 0:
      name: fact_sales_unique_booli_id
  - missing_count(sold_date) = 0:
      name: fact_sales_no_null_date
  - invalid_count(sold_price_sek) = 0:
      name: fact_sales_price_positive
      valid min: 50000
      valid max: 500000000
  - invalid_count(price_per_sqm) = 0:
      valid min: 1000
      valid max: 200000
      name: fact_sales_reasonable_price_per_sqm
      filter: price_per_sqm is not null

checks for bostadspuls_marts.mart_price_trends:
  - row_count > 0:
      name: mart_price_trends_not_empty
  - missing_count(avg_sold_price_sek) = 0:
      name: mart_price_trends_no_null_avg

checks for bostadspuls_marts.mart_regional_comparison:
  - row_count > 0:
      name: mart_regional_comparison_not_empty
